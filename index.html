<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Construction</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      
      /* Fondo Pleyades */
      background: url('https://images-assets.nasa.gov/image/PIA21422/PIA21422~orig.jpg') no-repeat center center/cover;
      position: relative;
    }

    /* Overlay oscuro para mejor contraste */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.65);
      top: 0;
      left: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 600px;
      padding: 20px;
      backdrop-filter: blur(6px);
      background: rgba(0,0,0,0.4);
      border-radius: 12px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 20px;
    }

    .loader {
      border: 5px solid #f3f3f3;
      border-top: 5px solid #00c3ff;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Formulario */
    form {
      margin-top: 20px;
    }

    input[type="email"] {
      padding: 12px;
      width: 70%;
      border: none;
      border-radius: 6px;
      outline: none;
      margin-bottom: 10px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      background: #00c3ff;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00a0cc;
    }

    footer {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #aaa;
    }

    .contact {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #ccc;
    }

    .contact a {
      color: #00c3ff;
      text-decoration: none;
    }

  </style>
</head>

<body>
  <div class="container">
    <h1>🚧 Under Construction 🚧</h1>
    <p>We're preparing something incredible from the Pleiades… Enrique Castillo Rincon</p>

    <div class="loader"></div>

    <!-- Formulario -->
    <form action="#" method="POST">
      <input type="email" name="email" placeholder="Your email address" required>
      <br>
      <button type="submit">Notify me</button>
    </form>

    <div class="contact">
      Contact us: <a href="mailto:zikmer@gmail.com">zikmer@gmail.com</a>
    </div>

    <footer>
      © 2026 | enriquecastillorincon.com | All Rights Reserved
    </footer>
  </div>
</body>
</html>
